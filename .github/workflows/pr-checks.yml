name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Lint
        run: pnpm lint

      - name: Validate Plugins
        run: pnpm run validate:plugins

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck review scripts
        run: pnpm exec tsc -p scripts/pr-review

      - name: Build
        run: pnpm build

      - name: Run tests
        run: npx turbo test -- --passWithNoTests --ci --testPathIgnorePatterns="api\.test\.ts|integration\.test\.ts"
        env:
          CI: true
          SKIP_PG_TESTS: 1

  plugin-gate:
    name: Plugin PR Gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Run plugin PR gate
        run: node --experimental-strip-types scripts/pr-review/gate-main.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
